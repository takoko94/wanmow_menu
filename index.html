<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>
わんも〜推し犬総選挙
</title>

<style>

@font-face{
font-family:'Yasashisa';
src:url('YasashisaGothicBold-V2.otf');
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

width:1280px;
height:720px;

overflow:hidden;

font-family:
'Yasashisa',
sans-serif;

background:
linear-gradient(
180deg,
#fff7f3 0%,
#fff2f6 100%
);

position:relative;

}

/* 背景 */

body::before{

content:"";

position:absolute;

inset:0;

background:

radial-gradient(
circle at 10% 20%,
rgba(255,192,203,0.25),
transparent 18%
),

radial-gradient(
circle at 85% 25%,
rgba(255,220,230,0.3),
transparent 16%
),

radial-gradient(
circle at 50% 90%,
rgba(255,210,220,0.25),
transparent 18%
);

pointer-events:none;

}

/* 肉球 */

body::after{

content:"🐾 🦴 💖 🐾 🧸 🐾";

position:absolute;

top:16px;
left:20px;

font-size:80px;

opacity:0.05;

letter-spacing:50px;

pointer-events:none;

}

/* 共通 */

.screen{

position:absolute;

top:0;
left:0;

width:1280px;
height:720px;

transition:
opacity 1s;

}

/* メニュー */

#menuScreen{

opacity:1;

display:flex;

align-items:center;
justify-content:center;

z-index:999;

}

/* 犬画面 */

#dogScreen{

opacity:0;

pointer-events:none;

z-index:1;

}

/* メニュー画像 */

.menuImage{

display:block;

width:1120px;

border-radius:42px;

border:
6px solid white;

box-shadow:
0 18px 40px
rgba(255,170,190,0.22);

object-fit:cover;

animation:
floatMenu 4s ease-in-out infinite;

}

/* ロゴ */

.logo{

position:absolute;

top:50%;

left:50%;

transform:
translate(-50%,-50%);

width:280px;

object-fit:contain;

filter:
drop-shadow(
0 10px 20px
rgba(0,0,0,0.14)
);

animation:
floatLogo 3s ease-in-out infinite;

z-index:10;

}

/* 犬種 */

.dog{

position:absolute;

padding:
10px 18px;

border-radius:
999px;

font-size:18px;

font-weight:900;

color:#6d4b45;

background:
rgba(255,255,255,0.72);

backdrop-filter:
blur(8px);

border:
3px solid rgba(255,255,255,0.9);

box-shadow:
0 8px 18px
rgba(255,170,190,0.16);

animation:
floatDog linear infinite;

white-space:nowrap;

}

/* 注釈 */

.note{

position:absolute;

bottom:14px;

width:100%;

text-align:center;

font-size:13px;

font-weight:900;

opacity:0.65;

color:#7a5c56;

}

/* キラ */

.sparkle{

position:absolute;

width:14px;
height:14px;

background:white;

border-radius:50%;

opacity:0.4;

animation:
sparkle 4s infinite;

}

/* アニメ */

@keyframes floatMenu{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-6px);
}

100%{
transform:translateY(0px);
}

}

@keyframes floatLogo{

0%{
transform:
translate(-50%,-50%)
translateY(0px);
}

50%{
transform:
translate(-50%,-50%)
translateY(-6px);
}

100%{
transform:
translate(-50%,-50%)
translateY(0px);
}

}

@keyframes floatDog{

0%{
transform:
translateY(0px)
scale(1);
}

50%{
transform:
translateY(-12px)
scale(1.03);
}

100%{
transform:
translateY(0px)
scale(1);
}

}

@keyframes sparkle{

0%{
transform:scale(0);
opacity:0;
}

50%{
transform:scale(1);
opacity:0.45;
}

100%{
transform:scale(0);
opacity:0;
}

}

</style>

</head>

<body>

<!-- BGM -->

<audio
id="bgm"
autoplay
loop
muted>

<source
src="bgm.mp3?v=999"
type="audio/mpeg">

</audio>

<!-- メニュー画面 -->

<div
class="screen"
id="menuScreen">

<img
src="menu2.jpg?v=999"
class="menuImage">

</div>

<!-- 犬画面 -->

<div
class="screen"
id="dogScreen">

<img
src="logo.png?v=999"
class="logo">

<div class="note">
※2人以上から投票されたわんちゃんを掲載しています
</div>

<!-- キラ -->

<div
class="sparkle"
style="
top:120px;
left:240px;
"></div>

<div
class="sparkle"
style="
top:300px;
right:220px;
animation-delay:1s;
"></div>

<div
class="sparkle"
style="
bottom:140px;
left:480px;
animation-delay:2s;
"></div>

<div
class="sparkle"
style="
bottom:220px;
right:380px;
animation-delay:3s;
"></div>

</div>

<script>

/* GAS */

const API_URL =
"https://script.google.com/macros/s/AKfycby7mjB5m4pMi63DHtdYOgfEZaQ7TJyAi3mOfndk7WHXyWDsvHeqFFCfdHI6BvjQQoNz6g/exec";

/* 色 */

const colors = [

"#fff2f7",
"#fff7ea",
"#eefcff",
"#f6f0ff",
"#fff3ee",
"#effff4",
"#fff4fb",
"#eef8ff"

];

/* 犬種読み込み */

async function loadDogs(){

try{

const res =
await fetch(API_URL);

const data =
await res.json();

const dogScreen =
document.getElementById(
"dogScreen"
);

/* 前回削除 */

document
.querySelectorAll(".dog")
.forEach(el=>el.remove());

/* 投票人数2人以上 */

const filtered =
data.filter(
dog =>
Number(dog["投票人数"]) >= 2
);

/* 重なり防止 */

const placed = [];

/* 描画 */

filtered.forEach((dog,i)=>{

const div =
document.createElement("div");

div.className = "dog";

let x;
let y;

let safe = false;

let loop = 0;

/* 重なり回避 */

while(!safe && loop < 200){

x =
Math.random() * 980 + 60;

y =
Math.random() * 560 + 60;

safe = true;

/* 真ん中ロゴ回避 */

if(
x > 390 &&
x < 830 &&
y > 210 &&
y < 520
){

safe = false;

}

/* 他犬種回避 */

placed.forEach(pos=>{

const dx =
x - pos.x;

const dy =
y - pos.y;

const distance =
Math.sqrt(
dx*dx + dy*dy
);

if(distance < 170){

safe = false;

}

});

loop++;

}

/* 記録 */

placed.push({
x:x,
y:y
});

div.style.left =
x + "px";

div.style.top =
y + "px";

div.style.animationDuration =
(Math.random()*3+5).toFixed(1)
+ "s";

div.style.background =
colors[
i % colors.length
];

div.innerHTML =
"🐶 " + dog.name;

dogScreen.appendChild(div);

});

}catch(e){

console.log(e);

}

}

/* 初回 */

loadDogs();

/* 更新 */

setInterval(
loadDogs,
30000
);

/* BGM */

const bgm =
document.getElementById("bgm");

bgm.volume = 0.01;

/* 自動再生 */

window.addEventListener(
"load",
async ()=>{

try{

await bgm.play();

bgm.muted = false;

}catch(e){

console.log(e);

}

});

/* 切り替え */

const menuScreen =
document.getElementById(
"menuScreen"
);

const dogScreen =
document.getElementById(
"dogScreen"
);

let showDogs = false;

setInterval(()=>{

showDogs = !showDogs;

if(showDogs){

menuScreen.style.opacity = "0";
menuScreen.style.pointerEvents = "none";

dogScreen.style.opacity = "1";
dogScreen.style.pointerEvents = "auto";

}else{

menuScreen.style.opacity = "1";
menuScreen.style.pointerEvents = "auto";

dogScreen.style.opacity = "0";
dogScreen.style.pointerEvents = "none";

}

},20000);

</script>

</body>
</html>
