body{

/* =========================
共通画面
========================= */

.screen{

  inset:0;

  height:720px;

}

メニュー画面
========================= */

#menuScreen{

  opacity:1;

  align-items:center;

  );

}

#menuScreen::before{

  inset:0;

  background:

  radial-gradient(
  circle at 10% 20%,
  rgba(255,192,203,0.25),

}

.menuWrap{

}

ランキング画面
========================= */

.top{

  0 8px 20px rgba(0,0,0,0.2);

/* 下画像 */

.bottom7 .photo{

/* TOP3名前 */

.top3 .name{
  width:100%;

  font-size:48px;
  line-height:1;

  color:#6b3400;

  text-align:center;

  text-shadow:
  0 2px 0 rgba(255,255,255,0.9),
  0 0 10px rgba(255,255,255,0.35);
}

/* 下名前 */

.bottom7 .name{

  color:#6b3400;

.small{

.top3 .vote{
  width:190px;

  0 0 10px rgba(255,255,255,0.9);

  white-space:nowrap;

  flex-shrink:0;

/* 下票 */

.bottom7 .vote{
  width:100%;

  align-items:center;
  justify-content:center;

  font-size:27px;

  border-radius:14px;

  background:rgba(255,255,255,0.78);

  color:#ff92b2;

  text-shadow:

/* キラ */

.sparkle{

  position:absolute;

  width:14px;
  height:14px;

  background:white;

  border-radius:50%;

  opacity:0.4;

  animation:
  sparkle 4s infinite;

}

/* アニメ */

@keyframes floatMenu{

  transform:translateY(0px);
  }

  50%{
  transform:translateY(-6px);
  }

  100%{
  transform:translateY(0px);

}

@keyframes sparkle{

  transform:scale(0);
  opacity:0;
  }

  50%{
  transform:scale(1);
  opacity:0.45;
  }

  100%{
  transform:scale(0);
  opacity:0;
  }

}

</style>
</head>

<script>

/* =========================
BGM
========================= */

const bgm =
document.getElementById("bgm");

bgm.volume = 0.01;

window.addEventListener(
"load",
async ()=>{

try{

await bgm.play();

bgm.muted = false;

}catch(e){

console.log(e);

}

});

/* =========================
画面切り替え
========================= */

const menuScreen =
document.getElementById(
"menuScreen"
);

const rankingScreen =
document.getElementById(
"rankingScreen"
);

const menuImage =
document.getElementById(
"menuImage"
);

/* =========================
状態
0 = menu2.jpg
1 = menu3.png
2 = ランキング
========================= */

let state = 0;

/* 初期表示 */

showMenu1();

/* =========================
表示関数
========================= */

function showMenu1(){

menuImage.src = "menu2.jpg";

menuScreen.style.opacity = "1";
rankingScreen.style.opacity = "0";

menuScreen.style.zIndex = "10";
rankingScreen.style.zIndex = "1";

}

function showMenu2(){

menuImage.src = "menu3.png";

menuScreen.style.opacity = "1";
rankingScreen.style.opacity = "0";

menuScreen.style.zIndex = "10";
rankingScreen.style.zIndex = "1";

}

function showRanking(){

menuScreen.style.opacity = "0";
rankingScreen.style.opacity = "1";

menuScreen.style.zIndex = "1";
rankingScreen.style.zIndex = "10";

}

/* =========================
ループ
menu2.jpg → 20秒
menu3.png → 10秒
ランキング → 20秒
========================= */

function nextScreen(){

if(state === 0){

state = 1;

showMenu2();

setTimeout(
nextScreen,
10000
);

}else if(state === 1){

state = 2;

showRanking();

setTimeout(
nextScreen,
20000
);

}else{

state = 0;

showMenu1();

setTimeout(
nextScreen,
20000
);

}

}

/* =========================
開始
========================= */

setTimeout(
nextScreen,
20000
);

</script>
