<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>
わんも〜推し犬総選挙
</title>

<style>

@font-face{
font-family:'Yasashisa';
src:url('YasashisaGothicBold-V2.otf');
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

width:1280px;
height:720px;

overflow:hidden;

font-family:
'Yasashisa',
sans-serif;

background:
linear-gradient(
180deg,
#fff7f3 0%,
#fff2f6 100%
);

position:relative;

}

/* 背景 */

body::before{

content:"";

position:absolute;

inset:0;

background:

radial-gradient(
circle at 10% 20%,
rgba(255,192,203,0.25),
transparent 18%
),

radial-gradient(
circle at 85% 25%,
rgba(255,220,230,0.3),
transparent 16%
),

radial-gradient(
circle at 50% 90%,
rgba(255,210,220,0.25),
transparent 18%
);

pointer-events:none;

}

/* 肉球 */

body::after{

content:"🐾 🦴 💖 🐾 🧸 🐾";

position:absolute;

top:16px;
left:20px;

font-size:80px;

opacity:0.05;

letter-spacing:50px;

pointer-events:none;

}

/* 共通 */

.screen{

position:absolute;

top:0;
left:0;

width:1280px;
height:720px;

transition:
opacity 1s;

}

/* メニュー */

#menuScreen{

opacity:1;

display:flex;

align-items:center;
justify-content:center;

z-index:999;

}

/* 犬画面 */

#dogScreen{

opacity:0;

pointer-events:none;

z-index:1;

}

/* メニュー画像 */

.menuImage{

display:block;

width:1120px;

border-radius:42px;

border:
6px solid white;

box-shadow:
0 18px 40px
rgba(255,170,190,0.22);

object-fit:cover;

animation:
floatMenu 4s ease-in-out infinite;

}

/* ロゴ */

.logo{

position:absolute;

top:50%;

left:50%;

transform:
translate(-50%,-50%);

width:280px;

object-fit:contain;

filter:
drop-shadow(
0 10px 20px
rgba(0,0,0,0.14)
);

animation:
floatLogo 3s ease-in-out infinite;

z-index:10;

}

/* 犬種 */

.dog{

position:absolute;

padding:
10px 18px;

border-radius:
999px;

font-size:18px;

font-weight:900;

color:#6d4b45;

background:
rgba(255,255,255,0.72);

backdrop-filter:
blur(8px);

border:
3px solid rgba(255,255,255,0.9);

box-shadow:
0 8px 18px
rgba(255,170,190,0.16);

animation:
floatDog linear infinite;

white-space:nowrap;

}

/* キラ */

.sparkle{

position:absolute;

width:14px;
height:14px;

background:white;

border-radius:50%;

opacity:0.4;

animation:
sparkle 4s infinite;

}

/* アニメ */

@keyframes floatMenu{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-6px);
}

100%{
transform:translateY(0px);
}

}

@keyframes floatLogo{

0%{
transform:
translate(-50%,-50%)
translateY(0px);
}

50%{
transform:
translate(-50%,-50%)
translateY(-6px);
}

100%{
transform:
translate(-50%,-50%)
translateY(0px);
}

}

@keyframes floatDog{

0%{
transform:
translateY(0px)
scale(1);
}

50%{
transform:
translateY(-12px)
scale(1.03);
}

100%{
transform:
translateY(0px)
scale(1);
}

}

@keyframes sparkle{

0%{
transform:scale(0);
opacity:0;
}

50%{
transform:scale(1);
opacity:0.45;
}

100%{
transform:scale(0);
opacity:0;
}

}

</style>

</head>

<body>

<!-- BGM -->

<audio
id="bgm"
autoplay
loop
muted>

<source
src="bgm.mp3?v=30"
type="audio/mpeg">

</audio>

<!-- メニュー画面 -->

<div
class="screen"
id="menuScreen">

<img
src="menu2.jpg?v=30"
class="menuImage">

</div>

<!-- 犬画面 -->

<div
class="screen"
id="dogScreen">

<img
src="logo.png?v=30"
class="logo">

<div
class="dog"
style="
top:120px;
left:120px;
animation-duration:5s;
background:#fff2f7;
">
🐶 柴犬
</div>

<div
class="dog"
style="
top:180px;
left:340px;
animation-duration:6s;
background:#fff7ea;
">
🐶 ダックスフンド
</div>

<div
class="dog"
style="
top:120px;
right:140px;
animation-duration:7s;
background:#eefcff;
">
🐶 パグ
</div>

<div
class="dog"
style="
top:300px;
left:80px;
animation-duration:5.5s;
background:#f6f0ff;
">
🐶 ポメラニアン
</div>

<div
class="dog"
style="
top:520px;
left:220px;
animation-duration:8s;
background:#fff3ee;
">
🐶 コーギー
</div>

<div
class="dog"
style="
top:320px;
right:100px;
animation-duration:6.5s;
background:#effff4;
">
🐶 ビーグル
</div>

<div
class="dog"
style="
top:520px;
right:220px;
animation-duration:7s;
background:#fff4fb;
">
🐶 シュナウザー
</div>

<div
class="dog"
style="
top:600px;
left:480px;
animation-duration:5.8s;
background:#eef8ff;
">
🐶 ハスキー
</div>

<div
class="dog"
style="
top:180px;
right:340px;
animation-duration:7.5s;
background:#fff6ed;
">
🐶 ゴールデンレトリバー
</div>

<div
class="dog"
style="
top:420px;
left:300px;
animation-duration:6.2s;
background:#fef4e8;
">
🐶 キャバリア
</div>

<div
class="dog"
style="
top:420px;
right:320px;
animation-duration:5.9s;
background:#eef9ff;
">
🐶 チワワ
</div>

<div
class="dog"
style="
top:620px;
right:480px;
animation-duration:7.1s;
background:#fff2fb;
">
🐶 プードル
</div>

<!-- キラ -->

<div
class="sparkle"
style="
top:100px;
left:240px;
"></div>

<div
class="sparkle"
style="
top:300px;
right:220px;
animation-delay:1s;
"></div>

<div
class="sparkle"
style="
bottom:140px;
left:480px;
animation-delay:2s;
"></div>

<div
class="sparkle"
style="
bottom:220px;
right:380px;
animation-delay:3s;
"></div>

</div>

<script>

/* BGM */

const bgm =
document.getElementById("bgm");

bgm.volume = 0.01;

/* 自動再生 */

window.addEventListener(
"load",
async ()=>{

try{

await bgm.play();

bgm.muted = false;

}catch(e){

console.log(e);

}

});

/* 切り替え */

const menuScreen =
document.getElementById(
"menuScreen"
);

const dogScreen =
document.getElementById(
"dogScreen"
);

let showDogs = false;

setInterval(()=>{

showDogs = !showDogs;

if(showDogs){

menuScreen.style.opacity = "0";
menuScreen.style.pointerEvents = "none";

dogScreen.style.opacity = "1";
dogScreen.style.pointerEvents = "auto";

}else{

menuScreen.style.opacity = "1";
menuScreen.style.pointerEvents = "auto";

dogScreen.style.opacity = "0";
dogScreen.style.pointerEvents = "none";

}

},20000);

</script>

</body>
</html>
