<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>
わんも〜推し犬総選挙
</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

width:1280px;
height:720px;

overflow:hidden;

font-family:
'Zen Maru Gothic',
sans-serif;

background:
linear-gradient(
180deg,
#fffaf5,
#fff6f9
);

padding:18px;

color:#5c4b42;

position:relative;

}

/* 全体 */

.wrapper{

width:1244px;
height:684px;

display:flex;
flex-direction:column;

gap:14px;

}

/* タイトル */

.header{

height:90px;

background:white;

border-radius:28px;

display:flex;

align-items:center;
justify-content:center;

font-size:42px;
font-weight:900;

color:#d28fa2;

border:3px solid #eadfd7;

box-shadow:
0 8px 20px rgba(0,0,0,0.05);

}

/* メイン */

.main{

flex:1;

display:flex;

gap:14px;

}

/* 左 */

.left{

width:65%;

background:white;

border-radius:28px;

padding:18px;

border:3px solid #eadfd7;

display:flex;

flex-direction:column;

gap:10px;

box-shadow:
0 8px 20px rgba(0,0,0,0.05);

}

/* 右 */

.right{

width:35%;

background:white;

border-radius:28px;

padding:18px;

border:3px solid #eadfd7;

box-shadow:
0 8px 20px rgba(0,0,0,0.05);

}

/* 見出し */

.title{

font-size:28px;

font-weight:900;

color:#d28fa2;

margin-bottom:8px;

text-align:center;

}

/* ランク */

.rank{

height:84px;

border-radius:24px;

display:flex;

align-items:center;

justify-content:space-between;

padding:0 22px;

font-size:30px;

font-weight:900;

margin-bottom:10px;

animation:pop 0.4s;

box-shadow:
0 4px 10px rgba(0,0,0,0.04);

}

.gold{
background:#fff0a8;
}

.silver{
background:#efefef;
}

.bronze{
background:#f7e7de;
}

.normal{
background:#fff8fb;
}

/* 左側 */

.rank-left{

display:flex;

align-items:center;

gap:16px;

}

/* メダル */

.medal{

width:54px;
height:54px;

border-radius:999px;

background:white;

display:flex;

align-items:center;
justify-content:center;

font-size:24px;

box-shadow:
0 4px 10px rgba(0,0,0,0.05);

}

/* 票数 */

.vote{

color:#d28fa2;

}

/* 6-10 */

.grid{

display:grid;

grid-template-columns:
1fr 1fr;

gap:10px;

}

/* 下位カード */

.small{

height:120px;

border-radius:22px;

background:#fff8fb;

display:flex;

flex-direction:column;

align-items:center;
justify-content:center;

font-weight:900;

border:3px solid #eadfd7;

box-shadow:
0 4px 10px rgba(0,0,0,0.04);

}

/* 更新 */

.update{

margin-top:12px;

font-size:14px;

text-align:center;

opacity:0.6;

}

/* 音量UI */

.volume-box{

position:absolute;

top:20px;
right:20px;

background:white;

padding:10px 16px;

border-radius:999px;

display:flex;

align-items:center;

gap:10px;

border:3px solid #eadfd7;

box-shadow:
0 4px 10px rgba(0,0,0,0.05);

z-index:9999;

}

#volumeSlider{

width:140px;

cursor:pointer;

}

/* 再生ボタン */

.start-button{

position:absolute;

top:50%;
left:50%;

transform:
translate(-50%,-50%);

background:white;

border:none;

border-radius:999px;

padding:22px 40px;

font-size:32px;

font-weight:900;

color:#d28fa2;

cursor:pointer;

border:4px solid #eadfd7;

box-shadow:
0 8px 20px rgba(0,0,0,0.1);

z-index:99999;

transition:0.2s;

}

.start-button:hover{

transform:
translate(-50%,-50%)
scale(1.05);

}

/* アニメ */

@keyframes pop{

0%{
transform:scale(0.95);
opacity:0;
}

100%{
transform:scale(1);
opacity:1;
}

}

</style>

</head>

<body>

<!-- BGM -->

<audio
id="bgm"
loop>

<source
src="bgm.mp3"
type="audio/mpeg">

</audio>

<!-- 再生ボタン -->

<button
class="start-button"
id="startButton">

🎵 BGM START 🎵

</button>

<!-- 音量 -->

<div class="volume-box">

🔊

<input
type="range"
id="volumeSlider"
min="0"
max="100"
value="30">

</div>

<div class="wrapper">

<div class="header">
🐶 わんも〜推し犬総選挙 🐶
</div>

<div class="main">

<!-- TOP5 -->

<div class="left">

<div class="title">
🏆 TOP 5
</div>

<div id="top5"></div>

</div>

<!-- 6-10 -->

<div class="right">

<div class="title">
🐾 6〜10位
</div>

<div class="grid"
id="top10">
</div>

<div class="update"
id="update">
更新中...
</div>

</div>

</div>

</div>

<script>

/* GAS URL */

const API_URL =
"https://script.google.com/macros/s/AKfycby7mjB5m4pMi63DHtdYOgfEZaQ7TJyAi3mOfndk7WHXyWDsvHeqFFCfdHI6BvjQQoNz6g/exec";

/* ランキング取得 */

async function loadRanking(){

try{

const res =
await fetch(API_URL);

const data =
await res.json();

drawRanking(data);

document
.getElementById("update")
.innerText =
"最終更新：" +
new Date()
.toLocaleTimeString();

}catch(e){

console.log(e);

}

}

/* 描画 */

function drawRanking(ranking){

const top5 =
document.getElementById("top5");

const top10 =
document.getElementById("top10");

top5.innerHTML = "";
top10.innerHTML = "";

ranking.forEach((dog,i)=>{

let cls = "normal";

if(i==0) cls="gold";
else if(i==1) cls="silver";
else if(i==2) cls="bronze";

const medal =
i==0 ? "🥇" :
i==1 ? "🥈" :
i==2 ? "🥉" :
(i+1)+"位";

if(i < 5){

top5.innerHTML += `

<div class="rank ${cls}">

<div class="rank-left">

<div class="medal">
${medal}
</div>

<div>
${dog.name}
</div>

</div>

<div class="vote">
${dog.votes}票
</div>

</div>

`;

}else if(i < 10){

top10.innerHTML += `

<div class="small">

<div style="font-size:18px;">
${i+1}位
</div>

<div style="
font-size:24px;
margin:6px 0;
">

${dog.name}

</div>

<div style="
font-size:24px;
color:#d28fa2;
">

${dog.votes}票

</div>

</div>

`;

}

});

}

/* 初回 */

loadRanking();

/* 自動更新 */

setInterval(
loadRanking,
10000
);

/* 音楽 */

const bgm =
document.getElementById("bgm");

const slider =
document.getElementById(
"volumeSlider"
);

const startButton =
document.getElementById(
"startButton"
);

bgm.volume = 0.3;

/* 再生 */

startButton.addEventListener(
"click",
async ()=>{

try{

await bgm.play();

startButton.style.display =
"none";

}catch(e){

console.log(e);

}

});

/* 音量 */

slider.addEventListener(
"input",
()=>{

bgm.volume =
slider.value / 100;

});

</script>

</body>
</html>
