<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280,height=720">
<title>わんも〜Cafe</title>

<style>

@font-face{
  font-family:'PandaBakery';
  src:url('pandabakery.ttf');
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  width:1280px;
  height:720px;
  overflow:hidden;
  position:relative;
  font-family:'PandaBakery',sans-serif;
}

/* 背景 */

.bg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

/* メニュー */

.menuScreen{
  position:absolute;
  inset:0;

  display:flex;
  align-items:center;
  justify-content:center;
}

.menuWrap{
  position:relative;
  z-index:2;

  animation:floatMenu 4s ease-in-out infinite;
}

.menuImage{

  width:1120px;

  border-radius:42px;

  border:6px solid #fff;

  box-shadow:
  0 18px 40px rgba(255,170,190,0.25);

  display:block;
}

/* キラキラ */

.sparkle{
  position:absolute;
  width:14px;
  height:14px;
  border-radius:50%;
  background:white;
  opacity:0.4;
  animation:sparkle 4s infinite;
}

.s1{
  top:120px;
  left:240px;
}

.s2{
  top:280px;
  right:220px;
  animation-delay:1s;
}

.s3{
  bottom:140px;
  left:480px;
  animation-delay:2s;
}

.s4{
  bottom:220px;
  right:380px;
  animation-delay:3s;
}

@keyframes floatMenu{

  0%{
    transform:translateY(0);
  }

  50%{
    transform:translateY(-6px);
  }

  100%{
    transform:translateY(0);
  }

}

@keyframes sparkle{

  0%{
    transform:scale(0);
    opacity:0;
  }

  50%{
    transform:scale(1);
    opacity:0.45;
  }

  100%{
    transform:scale(0);
    opacity:0;
  }

}

</style>
</head>

<body>

<img src="haikei.png" class="bg">

<audio
id="bgm"
autoplay
loop
muted>
<source src="bgm.mp3" type="audio/mpeg">
</audio>

<div class="menuScreen">

  <div class="menuWrap">

    <img
      src="menu2.jpg"
      class="menuImage"
      id="menuImage">

  </div>

  <div class="sparkle s1"></div>
  <div class="sparkle s2"></div>
  <div class="sparkle s3"></div>
  <div class="sparkle s4"></div>

</div>

<script>

const bgm =
document.getElementById("bgm");

bgm.volume = 0.01;

window.addEventListener(
"load",
async ()=>{

  try{

    await bgm.play();
    bgm.muted = false;

  }catch(e){

    console.log(e);

  }

});

const menuImage =
document.getElementById("menuImage");

let state = 0;

function nextSlide(){

  if(state === 0){

    menuImage.src = "menu3.png";
    state = 1;

    setTimeout(nextSlide,10000);

  }else if(state === 1){

    menuImage.src = "menu4.png";
    state = 2;

    setTimeout(nextSlide,10000);

  }else{

    menuImage.src = "menu2.jpg";
    state = 0;

    setTimeout(nextSlide,20000);

  }

}

setTimeout(nextSlide,20000);

</script>

</body>
</html>
