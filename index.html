<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>
わんも〜Cafe | wanmowcafe
</title>

<style>

@font-face{
font-family:'Yasashisa';
src:url('YasashisaGothicBold-V2.otf');
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

width:1280px;
height:720px;

overflow:hidden;

font-family:
'Yasashisa',
sans-serif;

background:
linear-gradient(
180deg,
#fff7f3 0%,
#fff2f6 100%
);

position:relative;

display:flex;
align-items:center;
justify-content:center;

}

/* 背景 */

body::before{

content:"";

position:absolute;

inset:0;

background:

radial-gradient(
circle at 10% 20%,
rgba(255,192,203,0.25),
transparent 18%
),

radial-gradient(
circle at 85% 25%,
rgba(255,220,230,0.3),
transparent 16%
),

radial-gradient(
circle at 50% 90%,
rgba(255,210,220,0.25),
transparent 18%
);

pointer-events:none;

}

/* 肉球 */

body::after{

content:"🐾 🦴 💖 🐾 🧸 🐾";

position:absolute;

top:16px;
left:20px;

font-size:80px;

opacity:0.05;

letter-spacing:50px;

pointer-events:none;

}

/* メニュー */

.menuWrap{

position:relative;

z-index:2;

animation:
floatMenu 4s ease-in-out infinite;

}

.menuImage{

display:block;

width:1120px;

border-radius:42px;

border:
6px solid white;

box-shadow:
0 18px 40px
rgba(255,170,190,0.22);

object-fit:cover;

}

/* ロゴ */

.logo{

position:absolute;

right:-40px;
bottom:-40px;

width:260px;

object-fit:contain;

filter:
drop-shadow(
0 10px 20px
rgba(0,0,0,0.14)
);

animation:
floatLogo 3s ease-in-out infinite;

}

/* キラ */

.sparkle{

position:absolute;

width:14px;
height:14px;

background:white;

border-radius:50%;

opacity:0.4;

animation:
sparkle 4s infinite;

}

/* アニメ */

@keyframes floatMenu{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-6px);
}

100%{
transform:translateY(0px);
}

}

@keyframes floatLogo{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-6px);
}

100%{
transform:translateY(0px);
}

}

@keyframes sparkle{

0%{
transform:scale(0);
opacity:0;
}

50%{
transform:scale(1);
opacity:0.45;
}

100%{
transform:scale(0);
opacity:0;
}

}

</style>

</head>

<body>

<!-- BGM -->

<audio
id="bgm"
autoplay
loop
muted>

<source
src="bgm.mp3?v=3000"
type="audio/mpeg">

</audio>

<!-- メニュー -->

<div class="menuWrap">

<img
src="menu2.jpg?v=3000"
class="menuImage">

<img
src="logo.png?v=3000"
class="logo">

</div>

<!-- キラ -->

<div
class="sparkle"
style="
top:120px;
left:240px;
"></div>

<div
class="sparkle"
style="
top:300px;
right:220px;
animation-delay:1s;
"></div>

<div
class="sparkle"
style="
bottom:140px;
left:480px;
animation-delay:2s;
"></div>

<div
class="sparkle"
style="
bottom:220px;
right:380px;
animation-delay:3s;
"></div>

<script>

/* BGM */

const bgm =
document.getElementById("bgm");

/* 音量 */

bgm.volume = 0.01;

/* 自動再生 */

window.addEventListener(
"load",
async ()=>{

try{

await bgm.play();

bgm.muted = false;

}catch(e){

console.log(e);

}

});

</script>

</body>
</html>
