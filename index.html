<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>
わんも〜推し犬総選挙
</title>

<style>

/* フォント */

@font-face{
font-family:'Yasashisa';
src:url('YasashisaGothicBold-V2.otf');
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,
body,
div,
span,
h1,
h2,
h3,
h4,
h5,
p,
button{

font-family:
'Yasashisa',
sans-serif !important;

}

body{

width:1280px;
height:720px;

overflow:hidden;

font-family:'Yasashisa' !important;

background:
linear-gradient(
180deg,
#fff9fb 0%,
#fff4f7 100%
);

position:relative;

color:#6a4a43;

}

/* 背景 */

body::before{

content:"";

position:absolute;

inset:0;

background:

radial-gradient(
circle at 10% 20%,
rgba(255,192,203,0.25),
transparent 18%
),

radial-gradient(
circle at 85% 25%,
rgba(255,220,230,0.3),
transparent 16%
),

radial-gradient(
circle at 50% 90%,
rgba(255,210,220,0.25),
transparent 18%
);

pointer-events:none;

}

/* 肉球 */

body::after{

content:"🐾 🦴 🐾 💖 🐾";

position:absolute;

top:16px;
left:20px;

font-size:80px;

opacity:0.05;

letter-spacing:50px;

pointer-events:none;

}

/* 全体 */

.wrapper{

width:1280px;
height:720px;

padding:14px;

display:flex;
flex-direction:column;

gap:10px;

position:relative;
z-index:2;

overflow:hidden;

transition:opacity 1s;

}

/* ヘッダー */

.header{

height:140px;

position:relative;

display:flex;

align-items:center;
justify-content:center;

padding-top:0;

flex-shrink:0;

}

/* ロゴ */

.logo{

width:720px;

max-width:88%;

max-height:120px;

object-fit:contain;

filter:
drop-shadow(
0 8px 18px
rgba(0,0,0,0.12)
);

animation:
floatLogo 3s ease-in-out infinite;

}

/* メイン */

.main{

flex:1;

display:flex;

gap:18px;

min-height:0;

}

/* 左右 */

.left,
.right{

background:
rgba(255,255,255,0.82);

backdrop-filter:blur(10px);

border-radius:36px;

border:4px solid #ffe1ea;

box-shadow:
0 10px 25px rgba(255,170,190,0.12);

padding:16px;

position:relative;

overflow:hidden;

}

/* 上キラ */

.left::before,
.right::before{

content:"";

position:absolute;

top:-80px;
left:-120px;

width:250px;
height:200px;

background:
rgba(255,255,255,0.35);

transform:rotate(25deg);

animation:shine 7s linear infinite;

}

/* 左 */

.left{

width:64%;

display:flex;

flex-direction:column;

gap:8px;

}

/* 右 */

.right{

width:36%;

}

/* 見出し */

.title{

height:56px;

display:flex;

align-items:center;
justify-content:center;

font-size:30px;

font-weight:900;

color:white;

background:
linear-gradient(
180deg,
#ff9db7,
#ff7fa2
);

border-radius:999px;

margin-bottom:8px;

box-shadow:
0 6px 14px rgba(255,130,170,0.25);

border:4px solid white;

}

/* ランク */

.rank{

height:78px;

border-radius:30px;

display:flex;

align-items:center;

justify-content:space-between;

padding:0 20px;

font-size:28px;

font-weight:900;

margin-bottom:10px;

box-shadow:
0 5px 12px rgba(0,0,0,0.05);

border:4px solid rgba(255,255,255,0.9);

position:relative;

overflow:hidden;

animation:pop 0.4s;

}

/* キラ */

.rank::after{

content:"";

position:absolute;

top:0;
left:0;

width:100%;
height:100%;

background:
linear-gradient(
120deg,
transparent,
rgba(255,255,255,0.4),
transparent
);

transform:translateX(-100%);

animation:shine2 5s infinite;

}

/* 色 */

.gold{
background:
linear-gradient(
135deg,
#fff7c0,
#ffe68f
);
}

.silver{
background:
linear-gradient(
135deg,
#f7f7f7,
#e7e7e7
);
}

.bronze{
background:
linear-gradient(
135deg,
#ffe6d6,
#ffd0b4
);
}

.normal{
background:
linear-gradient(
135deg,
#fffafd,
#fff3f7
);
}

/* 左側 */

.rank-left{

display:flex;

align-items:center;

gap:14px;

}

/* メダル */

.medal{

width:54px;
height:54px;

border-radius:999px;

background:white;

display:flex;

align-items:center;
justify-content:center;

font-size:24px;

box-shadow:
0 4px 10px rgba(0,0,0,0.08);

border:3px solid rgba(255,255,255,0.9);

}

/* 票 */

.vote{

background:
linear-gradient(
180deg,
#ff9db7,
#ff7fa2
);

color:white;

padding:8px 18px;

border-radius:999px;

font-size:22px;

box-shadow:
0 4px 10px rgba(255,130,170,0.22);

}

/* 右 */

.grid{

display:grid;

grid-template-columns:
1fr 1fr;

gap:10px;

}

/* 小カード */

.small{

height:118px;

border-radius:28px;

background:
linear-gradient(
180deg,
#fffdfd,
#fff5f8
);

border:4px solid #ffe3ec;

display:flex;

flex-direction:column;

align-items:center;
justify-content:center;

position:relative;

box-shadow:
0 5px 12px rgba(0,0,0,0.04);

animation:pop 0.4s;

overflow:hidden;

}

.small::after{

content:"🐾";

position:absolute;

right:10px;
bottom:4px;

font-size:24px;

opacity:0.12;

}

/* 更新 */

.update{

margin-top:10px;

text-align:center;

font-size:14px;

opacity:0.65;

font-weight:700;

}

/* 画像切り替え */

#imageScreen{

opacity:0;
pointer-events:none;

position:absolute;

top:0;
left:0;

width:1280px;
height:720px;

z-index:999;

background:
linear-gradient(
180deg,
#ffdbe7,
#fff4f7
);

transition:opacity 1s;

overflow:hidden;

}

#imageScreen img{

width:100%;
height:100%;

object-fit:cover;

display:block;

}

/* アニメ */

@keyframes pop{

0%{
transform:scale(0.95);
opacity:0;
}

100%{
transform:scale(1);
opacity:1;
}

}

@keyframes shine{

0%{
transform:
translateX(0)
rotate(25deg);
}

100%{
transform:
translateX(1600px)
rotate(25deg);
}

}

@keyframes shine2{

0%{
transform:translateX(-100%);
}

40%{
transform:translateX(120%);
}

100%{
transform:translateX(120%);
}

}

@keyframes floatLogo{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-6px);
}

100%{
transform:translateY(0px);
}

}

</style>

</head>

<body>

<!-- BGM -->

<audio
id="bgm"
autoplay
loop
muted>

<source
src="bgm.mp3"
type="audio/mpeg">

</audio>

<!-- 切り替え画像 -->

<div id="imageScreen">

<img
src="event.jpg">

</div>

<!-- 全体 -->

<div class="wrapper">

<!-- ヘッダー -->

<div class="header">

<img
src="logo.png"
class="logo">

</div>

<!-- メイン -->

<div class="main">

<!-- 左 -->

<div class="left">

<div class="title">
🏆 TOP 5 🏆
</div>

<div id="top5"></div>

</div>

<!-- 右 -->

<div class="right">

<div class="title">
🐾 6〜10位 🐾
</div>

<div class="grid"
id="top10">
</div>

<div class="update"
id="update">
更新中...
</div>

</div>

</div>

</div>

<script>

/* GAS URL */

const API_URL =
"https://script.google.com/macros/s/AKfycby7mjB5m4pMi63DHtdYOgfEZaQ7TJyAi3mOfndk7WHXyWDsvHeqFFCfdHI6BvjQQoNz6g/exec";

/* ランキング取得 */

async function loadRanking(){

try{

const res =
await fetch(API_URL);

const data =
await res.json();

drawRanking(data);

document
.getElementById("update")
.innerText =
"最終更新：" +
new Date()
.toLocaleTimeString();

}catch(e){

console.log(e);

}

}

/* 描画 */

function drawRanking(ranking){

const top5 =
document.getElementById("top5");

const top10 =
document.getElementById("top10");

top5.innerHTML = "";
top10.innerHTML = "";

ranking.forEach((dog,i)=>{

let cls = "normal";

if(i==0) cls="gold";
else if(i==1) cls="silver";
else if(i==2) cls="bronze";

const medal =
i==0 ? "🥇" :
i==1 ? "🥈" :
i==2 ? "🥉" :
(i+1)+"位";

if(i < 5){

top5.innerHTML += `

<div class="rank ${cls}">

<div class="rank-left">

<div class="medal">
${medal}
</div>

<div>
${dog.name}
</div>

</div>

<div class="vote">
${dog.votes}票
</div>

</div>

`;

}else if(i < 10){

top10.innerHTML += `

<div class="small">

<div style="
font-size:20px;
color:#ff7fa2;
margin-bottom:4px;
">
${i+1}位
</div>

<div style="
font-size:26px;
font-weight:900;
margin-bottom:6px;
text-align:center;
">

${dog.name}

</div>

<div style="
font-size:22px;
color:#ff7fa2;
font-weight:900;
">

${dog.votes}票

</div>

</div>

`;

}

});

}

/* 初回 */

loadRanking();

/* 自動更新 */

setInterval(
loadRanking,
10000
);

/* BGM */

const bgm =
document.getElementById("bgm");

bgm.volume = 0.01;

/* 自動再生 */

window.addEventListener(
"load",
async ()=>{

try{

await bgm.play();

bgm.muted = false;

}catch(e){

console.log(e);

}

});

/* 画面切り替え */

const wrapper =
document.querySelector(
".wrapper"
);

const imageScreen =
document.getElementById(
"imageScreen"
);

let showImage = false;

setInterval(()=>{

showImage = !showImage;

if(showImage){

wrapper.style.opacity = "0";

imageScreen.style.opacity = "1";

imageScreen.style.pointerEvents =
"auto";

}else{

wrapper.style.opacity = "1";

imageScreen.style.opacity = "0";

imageScreen.style.pointerEvents =
"none";

}

},20000);

</script>

</body>
</html>
