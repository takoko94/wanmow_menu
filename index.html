<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>
わんも〜推し犬総選挙
</title>

<style>

/* フォント */

@font-face{
font-family:'Yasashisa';
src:url('YasashisaGothicBold-V2.otf');
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,
body,
div,
span,
h1,
h2,
h3,
h4,
h5,
p,
button{

font-family:
'Yasashisa',
sans-serif !important;

}

body{

width:1280px;
height:720px;

overflow:hidden;

font-family:'Yasashisa' !important;

background:
linear-gradient(
180deg,
#fff7f3 0%,
#fff2f6 100%
);

position:relative;

color:#6a4a43;

display:flex;
align-items:center;
justify-content:center;

}

/* 背景キラ */

body::before{

content:"";

position:absolute;

inset:0;

background:

radial-gradient(
circle at 10% 20%,
rgba(255,192,203,0.25),
transparent 18%
),

radial-gradient(
circle at 85% 25%,
rgba(255,220,230,0.3),
transparent 16%
),

radial-gradient(
circle at 50% 90%,
rgba(255,210,220,0.25),
transparent 18%
);

pointer-events:none;

}

/* 肉球 */

body::after{

content:"🐾 🦴 💖 🐾 🧸 🐾";

position:absolute;

top:16px;
left:20px;

font-size:80px;

opacity:0.05;

letter-spacing:50px;

pointer-events:none;

}

/* 全体 */

.wrapper{

width:1280px;
height:720px;

display:flex;

align-items:center;
justify-content:center;

position:relative;

overflow:hidden;

}

/* ロゴ */

.logo{

width:1180px;

max-width:95%;

object-fit:contain;

filter:
drop-shadow(
0 14px 26px
rgba(0,0,0,0.14)
);

animation:
floatLogo 3s ease-in-out infinite;

z-index:2;

}

/* キラ演出 */

.shine{

position:absolute;

top:-200px;
left:-300px;

width:400px;
height:1200px;

background:
linear-gradient(
90deg,
transparent,
rgba(255,255,255,0.28),
transparent
);

transform:
rotate(25deg);

animation:
shine 7s linear infinite;

pointer-events:none;

}

/* ふわふわ */

@keyframes floatLogo{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-8px);
}

100%{
transform:translateY(0px);
}

}

/* キラ */

@keyframes shine{

0%{
transform:
translateX(-400px)
rotate(25deg);
}

100%{
transform:
translateX(1800px)
rotate(25deg);
}

}

</style>

</head>

<body>

<!-- BGM -->

<audio
id="bgm"
autoplay
loop
muted>

<source
src="bgm.mp3"
type="audio/mpeg">

</audio>

<!-- 全体 -->

<div class="wrapper">

<div class="shine"></div>

<img
src="logo.png"
class="logo">

</div>

<script>

/* BGM */

const bgm =
document.getElementById("bgm");

/* 音量 */

bgm.volume = 0.01;

/* 自動再生 */

window.addEventListener(
"load",
async ()=>{

try{

await bgm.play();

bgm.muted = false;

}catch(e){

console.log(e);

}

});

</script>

</body>
</html>
